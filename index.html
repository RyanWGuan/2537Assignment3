<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Memory</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-dark">
  <div class="container py-4">

    <h1 class="text-center mb-4">Pokémon Memory</h1>

    <div class="row justify-content-center mb-3">
      <div class="col-auto">
        <div class="d-flex gap-2 flex-wrap justify-content-center">
          <button class="btn btn-ruby difficulty-btn active" data-difficulty="easy">Easy</button>
          <button class="btn btn-ruby difficulty-btn" data-difficulty="medium">Medium</button>
          <button class="btn btn-ruby difficulty-btn" data-difficulty="hard">Hard</button>
          <button class="btn btn-gold" id="start-btn">Start</button>
          <button class="btn btn-reset" id="reset-btn">Reset</button>
          <button class="btn btn-powerup" id="powerup-btn">Peek</button>
          <button class="btn btn-theme" id="theme-btn">Light Mode</button>
        </div>
      </div>
    </div>

    <div class="row justify-content-center mb-3">
      <div class="col-auto">
        <div id="game-message" class="d-none game-message"></div>
      </div>
    </div>

    <div class="row justify-content-center mb-4">
      <div class="col-auto">
        <div id="stats">
          <div class="d-flex gap-4 flex-wrap justify-content-center">
            <span>Clicks: <span id="stat_clicks">0</span></span>
            <span>Matches: <span id="stat_matches">0</span></span>
            <span>Pairs Left: <span id="stat_pairs">0</span></span>
            <span>Total: <span id="stat_total">0</span></span>
            <span>Time: <span id="stat_timer">0</span>s</span>
          </div>
        </div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-auto">
        <div id="game_grid"></div>
      </div>
    </div>

  </div>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="index.js"></script>
</body>

</html>
